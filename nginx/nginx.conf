user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Обмеження розміру тіла (для Telegram updates)
    client_max_body_size 20M;

    # ---------------------------------------------------------------------------
    # HTTP — редирект на HTTPS + certbot challenge
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name netishynanimals.space www.netishynanimals.space;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Все інше — редирект на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name netishynanimals.space www.netishynanimals.space;

        ssl_certificate     /etc/letsencrypt/live/netishynanimals.space/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/netishynanimals.space/privkey.pem;

        # Сучасні SSL параметри
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ---------------------------------------------------------------------------
        # Telegram webhook
        # ---------------------------------------------------------------------------
        location /webhook {
            proxy_pass         http://bot:8080/webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Передаємо секретний токен Telegram
            proxy_set_header   X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;

            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ---------------------------------------------------------------------------
        # Health check
        # ---------------------------------------------------------------------------
        location /health {
            proxy_pass         http://bot:8080/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ---------------------------------------------------------------------------
        # Блокуємо все інше
        # ---------------------------------------------------------------------------
        location / {
            return 404;
        }
    }
}
